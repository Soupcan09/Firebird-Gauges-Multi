<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <style>
    .lbl { font-size: 14px; fill: #111; }
    .num { font-size: 14px; font-weight: 700; fill: #b30000; }
    .sub { font-size: 11px; fill: #444; }
    .ttl { font-size: 18px; font-weight: 700; fill: #111; }
    .dim { stroke: #b30000; stroke-width: 1.4; fill: none; }
    .arr { stroke: #b30000; stroke-width: 1.4; fill: #b30000; }
    .pcb { fill: #1f6f3a; stroke: #0c3a1d; stroke-width: 1.5; }
    .glass { fill: #111; stroke: #000; stroke-width: 1; }
    .hole { fill: #ffffff; stroke: #0c3a1d; stroke-width: 1; }
    .gold { fill: #d4a017; stroke: #6d5208; stroke-width: 1; }
    .dash { stroke: #b30000; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .axis { stroke: #888; stroke-width: 0.7; stroke-dasharray: 2 3; fill: none; }
    .leg  { font-size: 12px; fill: #333; }
  </style>

  <!-- Title -->
  <text x="20" y="32" class="ttl">Caliper this — 5 numbers (OD already confirmed Ø 75 mm)</text>
  <text x="20" y="52" class="sub">Top view (left) and side view (right). All values in millimetres.</text>

  <!-- ============== TOP VIEW ============== -->
  <g transform="translate(40,90)">
    <text x="0" y="0" class="lbl" font-weight="700">Top view (looking at the screen)</text>

    <!-- Round PCB Ø75 - drawn at scale 4 px/mm, so r=150 -->
    <circle cx="180" cy="180" r="150" class="pcb"/>
    <!-- Round visible glass ~Ø53.3 -->
    <circle cx="180" cy="180" r="106" class="glass"/>
    <!-- Bolt circle dashed -->
    <circle cx="180" cy="180" r="140" class="dash"/>

    <!-- Mounting holes — drawn as 4-on-square (placeholder; user counts the actual N) -->
    <g>
      <circle cx="280.0" cy="180.0" r="6" class="hole"/>
      <circle cx="80.0"  cy="180.0" r="6" class="hole"/>
      <circle cx="180.0" cy="280.0" r="6" class="hole"/>
      <circle cx="180.0" cy="80.0"  r="6" class="hole"/>
    </g>

    <!-- (1) OD callout -->
    <line x1="30" y1="180" x2="330" y2="180" class="dim"/>
    <polygon points="30,180 40,176 40,184" class="arr"/>
    <polygon points="330,180 320,176 320,184" class="arr"/>
    <text x="180" y="172" text-anchor="middle" class="num">Ø PCB OD</text>
    <text x="180" y="186" text-anchor="middle" class="sub">(confirmed) 75.0 mm</text>

    <!-- (3) Hole BCD callout -->
    <line x1="40" y1="100" x2="320" y2="100" class="dim"/>
    <polygon points="40,100 50,96 50,104" class="arr"/>
    <polygon points="320,100 310,96 310,104" class="arr"/>
    <text x="180" y="92"  text-anchor="middle" class="num">Ø Hole BCD = ?</text>
    <text x="180" y="105" text-anchor="middle" class="sub">center-to-center across the bolt circle</text>

    <!-- Hole Ø leader -->
    <line x1="280" y1="180" x2="380" y2="120" class="dim"/>
    <polygon points="282,180 274,184 280,176" class="arr"/>
    <text x="385" y="116" class="num">Ø hole = ?</text>
    <text x="385" y="130" class="sub">(M2.5 ≈ 2.8, M3 ≈ 3.2)</text>

    <!-- Number of holes -->
    <text x="385" y="156" class="num">N holes = ?</text>
    <text x="385" y="170" class="sub">3 or 4</text>

    <!-- Visible glass leader -->
    <line x1="180" y1="180" x2="380" y2="220" class="dim"/>
    <polygon points="180,180 184,188 176,184" class="arr"/>
    <text x="385" y="220" class="num">Ø visible glass</text>
    <text x="385" y="234" class="sub">≈ 53.3 (= 2.1″ diag)</text>

    <!-- caption -->
    <text x="0" y="365" class="leg">Tip: hole BCD = the diameter of the imaginary circle that passes through the centers of the screw holes.</text>
    <text x="0" y="382" class="leg">Just measure between centers of two holes that face each other across the board → that's BCD.</text>
  </g>

  <!-- ============== SIDE VIEW ============== -->
  <g transform="translate(560,90)">
    <text x="0" y="0" class="lbl" font-weight="700">Side view (edge-on)</text>

    <!-- Glass stack on top: ~3 mm glass -->
    <rect x="20" y="40" width="260" height="12" class="glass"/>
    <!-- PCB: ~1.6 mm -->
    <rect x="0"  y="52" width="300" height="8"  class="pcb"/>
    <!-- Rear components: USB-C (gold), pin headers (gold), JST (gold) -->
    <rect x="20"  y="60" width="40" height="40" class="gold"/>
    <rect x="100" y="60" width="80" height="22" class="gold"/>
    <rect x="220" y="60" width="50" height="32" class="gold"/>

    <!-- (2) PCB thickness -->
    <line x1="320" y1="52" x2="320" y2="60" class="dim"/>
    <polygon points="320,52 316,55 324,55" class="arr"/>
    <polygon points="320,60 316,57 324,57" class="arr"/>
    <text x="332" y="60" class="num">PCB thickness = ?</text>
    <text x="332" y="74" class="sub">probably 1.6</text>

    <!-- (5) Rear stack height: from PCB back to tallest component -->
    <line x1="0" y1="60" x2="0" y2="100" class="dim"/>
    <polygon points="0,60 -3,68 3,68" class="arr"/>
    <polygon points="0,100 -3,92 3,92" class="arr"/>
    <text x="-10" y="84" text-anchor="end" class="num">Rear depth = ?</text>
    <text x="-10" y="98" text-anchor="end" class="sub">PCB back → tallest pin/USB-C</text>

    <!-- Note about USB-C -->
    <text x="20" y="130" class="leg">Measure to the back of the USB-C *connector*, not the cable.</text>
    <text x="20" y="146" class="leg">Whichever rear part sticks out the furthest is what sets enclosure clearance.</text>

    <!-- Front glass standoff (optional) -->
    <line x1="290" y1="40" x2="290" y2="52" class="dim"/>
    <polygon points="290,40 286,43 294,43" class="arr"/>
    <polygon points="290,52 286,49 294,49" class="arr"/>
    <text x="298" y="50" class="sub">(glass front above PCB ≈ 1.5–3, optional)</text>
  </g>

  <!-- ============== SUMMARY TABLE ============== -->
  <g transform="translate(40,440)">
    <rect x="0" y="0" width="820" height="100" fill="#fafafa" stroke="#ccc"/>
    <text x="14" y="22" class="ttl">Numbers I need from you (5):</text>
    <text x="14" y="46" class="lbl"><tspan class="num">①</tspan> Ø PCB OD &#8594; <tspan class="num">75.0</tspan> ✓ confirmed</text>
    <text x="14" y="64" class="lbl"><tspan class="num">②</tspan> PCB thickness &#8594; ___ mm  (probably 1.6)</text>
    <text x="14" y="82" class="lbl"><tspan class="num">③</tspan> Hole BCD &#8594; ___ mm   <tspan class="sub">(center-to-center between two opposite holes)</tspan></text>
    <text x="430" y="46" class="lbl"><tspan class="num">④</tspan> Hole Ø &#8594; ___ mm   &amp;   N holes &#8594; ___</text>
    <text x="430" y="64" class="lbl"><tspan class="num">⑤</tspan> Rear stack height &#8594; ___ mm  <tspan class="sub">(PCB back → tallest part on back)</tspan></text>
    <text x="430" y="86" class="sub">Send them back as 5 numbers in chat — I'll plug them into the SCAD and re-render.</text>
  </g>
</svg>

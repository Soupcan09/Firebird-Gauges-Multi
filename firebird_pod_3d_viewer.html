<h2 class="sr-only">Interactive 3D view of the Firebird gauge pod, Rev B. Drag to rotate, scroll to zoom.</h2>

<div style="position: relative; width: 100%; height: 460px; background: #15171f; border-radius: var(--border-radius-lg); overflow: hidden; border: 0.5px solid var(--color-border-tertiary);">
  <canvas id="pod-canvas" style="width: 100%; height: 100%; display: block; cursor: grab;"></canvas>
  <div style="position: absolute; bottom: 10px; left: 12px; color: rgba(255,255,255,0.65); font-size: 11px; font-family: var(--font-sans);">Drag to rotate · scroll to zoom</div>
  <div style="position: absolute; top: 12px; right: 14px; color: rgba(255,255,255,0.85); font-size: 12px; font-family: var(--font-mono); text-align: right; line-height: 1.55;">171 × 83 × 24 mm<br>15° yaw toward driver (LHD)<br>2× Ø55 bezels @ 90 mm o.c.</div>
</div>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-top: 12px;">
  <button id="btn-iso" style="padding: 8px 12px;">3/4 view</button>
  <button id="btn-front" style="padding: 8px 12px;">Front</button>
  <button id="btn-driver" style="padding: 8px 12px;">Driver POV</button>
  <button id="btn-top" style="padding: 8px 12px;">Top</button>
  <button id="btn-back" style="padding: 8px 12px;">Back</button>
  <button id="btn-wire" style="padding: 8px 12px;">Wireframe</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const canvas = document.getElementById('pod-canvas');
  const W = () => canvas.clientWidth, H = () => canvas.clientHeight;

  const scene = new THREE.Scene();
  scene.background = null;

  const camera = new THREE.PerspectiveCamera(32, W()/H(), 1, 3000);
  camera.position.set(180, 130, 320);

  const renderer = new THREE.WebGLRenderer({canvas, antialias: true, alpha: true});
  renderer.setSize(W(), H());
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const key = new THREE.DirectionalLight(0xffffff, 0.85);
  key.position.set(180, 260, 220);
  scene.add(key);
  const fill = new THREE.DirectionalLight(0x90b0ff, 0.25);
  fill.position.set(-220, 60, -120);
  scene.add(fill);

  const podW = 171, podH = 83, podD = 19;
  const flangeT = 5;
  const spacing = 90;
  const tiltDeg = 15;
  const tilt = -tiltDeg * Math.PI / 180;

  const pivot = new THREE.Group();
  scene.add(pivot);

  const flangeMat = new THREE.MeshStandardMaterial({color: 0x4a3220, roughness: 0.85});
  const flange = new THREE.Mesh(new THREE.BoxGeometry(podW, podH, flangeT), flangeMat);
  flange.position.set(0, 0, flangeT/2);
  pivot.add(flange);

  const slot = new THREE.Mesh(
    new THREE.BoxGeometry(30, 12, flangeT + 0.4),
    new THREE.MeshStandardMaterial({color: 0x000000})
  );
  slot.position.set(0, -podH/2 + 12, flangeT/2);
  pivot.add(slot);

  for (const xs of [-1, 1]) {
    const screw = new THREE.Mesh(
      new THREE.CylinderGeometry(2.75, 2.75, flangeT + 0.3, 24),
      new THREE.MeshStandardMaterial({color: 0x111111})
    );
    screw.position.set(xs * 65, 0, flangeT/2);
    screw.rotation.x = Math.PI / 2;
    pivot.add(screw);
    const csk = new THREE.Mesh(
      new THREE.CylinderGeometry(5.5, 2.75, 1.5, 24),
      new THREE.MeshStandardMaterial({color: 0x222222})
    );
    csk.position.set(xs * 65, 0, flangeT - 0.6);
    csk.rotation.x = Math.PI / 2;
    pivot.add(csk);
  }

  const podGroup = new THREE.Group();
  const fasciaMat = new THREE.MeshStandardMaterial({color: 0xa67a47, roughness: 0.55});
  const body = new THREE.Mesh(new THREE.BoxGeometry(podW, podH, podD), fasciaMat);
  body.position.set(0, 0, podD/2);
  podGroup.add(body);

  for (const xs of [-1, 1]) {
    const bezel = new THREE.Mesh(
      new THREE.CylinderGeometry(27.5, 27.5, podD + 0.3, 64),
      new THREE.MeshStandardMaterial({color: 0x080a10})
    );
    bezel.position.set(xs * spacing/2, 0, podD/2);
    bezel.rotation.x = Math.PI / 2;
    podGroup.add(bezel);

    const chamfer = new THREE.Mesh(
      new THREE.CylinderGeometry(29.7, 27.5, 1, 64, 1, true),
      new THREE.MeshStandardMaterial({color: 0x6a4a28, roughness: 0.6, side: THREE.DoubleSide})
    );
    chamfer.position.set(xs * spacing/2, 0, podD - 0.5);
    chamfer.rotation.x = Math.PI / 2;
    podGroup.add(chamfer);

    const glass = new THREE.Mesh(
      new THREE.CircleGeometry(53.28/2, 64),
      new THREE.MeshStandardMaterial({color: 0x1c2a44, emissive: 0x182842, emissiveIntensity: 0.65, roughness: 0.25})
    );
    glass.position.set(xs * spacing/2, 0, podD - 1.0);
    podGroup.add(glass);

    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(29.0, 0.55, 10, 80),
      new THREE.MeshStandardMaterial({color: 0xc8a878, roughness: 0.25, metalness: 0.7})
    );
    ring.position.set(xs * spacing/2, 0, podD - 0.05);
    podGroup.add(ring);
  }

  podGroup.rotation.y = tilt;
  podGroup.position.set(0, 0, flangeT);
  pivot.add(podGroup);

  pivot.rotation.x = -0.32;
  pivot.rotation.y = 0.55;

  let wire = false;
  function setWire(on) {
    wire = on;
    pivot.traverse(o => { if (o.material) o.material.wireframe = on; });
  }

  let dragging = false, lx = 0, ly = 0;
  canvas.addEventListener('mousedown', e => { dragging = true; lx = e.clientX; ly = e.clientY; canvas.style.cursor = 'grabbing'; });
  window.addEventListener('mouseup', () => { dragging = false; canvas.style.cursor = 'grab'; });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    pivot.rotation.y += (e.clientX - lx) * 0.01;
    pivot.rotation.x += (e.clientY - ly) * 0.01;
    pivot.rotation.x = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, pivot.rotation.x));
    lx = e.clientX; ly = e.clientY;
  });

  let camDist = camera.position.length();
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    camDist *= (1 + e.deltaY * 0.0012);
    camDist = Math.max(120, Math.min(900, camDist));
    const dir = camera.position.clone().normalize();
    camera.position.copy(dir.multiplyScalar(camDist));
    camera.lookAt(0, 0, 0);
  }, {passive: false});

  canvas.addEventListener('touchstart', e => { if (e.touches.length === 1) { dragging = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY; } }, {passive: true});
  canvas.addEventListener('touchend', () => dragging = false);
  canvas.addEventListener('touchmove', e => {
    if (!dragging || e.touches.length !== 1) return;
    pivot.rotation.y += (e.touches[0].clientX - lx) * 0.01;
    pivot.rotation.x += (e.touches[0].clientY - ly) * 0.01;
    pivot.rotation.x = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, pivot.rotation.x));
    lx = e.touches[0].clientX; ly = e.touches[0].clientY;
  }, {passive: true});

  function setView(rx, ry) { pivot.rotation.x = rx; pivot.rotation.y = ry; }
  document.getElementById('btn-iso').onclick = () => setView(-0.32, 0.55);
  document.getElementById('btn-front').onclick = () => setView(0, 0);
  document.getElementById('btn-driver').onclick = () => setView(0, -0.7);
  document.getElementById('btn-top').onclick = () => setView(-Math.PI/2 + 0.05, 0);
  document.getElementById('btn-back').onclick = () => setView(0, Math.PI);
  document.getElementById('btn-wire').onclick = () => setWire(!wire);

  function onResize() {
    renderer.setSize(W(), H());
    camera.aspect = W() / H();
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', onResize);

  function loop() {
    requestAnimationFrame(loop);
    renderer.render(scene, camera);
  }
  loop();
})();
</script>
